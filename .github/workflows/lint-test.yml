name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: |
          cd front
          npm ci

      - name: Run lint
        run: |
          cd front
          npm run lint

      - name: Run tests
        run: |
          cd front
          npm test -- --passWithNoTests --coverage=false --watchAll=false

  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: back/requirements.txt

      - name: Install dependencies
        run: |
          cd back
          pip install -r requirements.txt
          pip install ruff

      - name: Run ruff
        run: |
          cd back
          ruff check bots/ server/

      - name: Run tests
        run: |
          cd back
          pytest