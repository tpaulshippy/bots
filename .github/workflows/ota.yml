name: OTA Update

on:
  push:
    branches: ['main']

jobs:
  ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: |
          cd front
          npm ci --legacy-peer-deps

      - name: Export and push OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'
          EXPO_PUBLIC_API_BASE_URL: https://syftlearning.app/api
        run: |
          cd front
          rm -rf dist
          npx expo export --platform ios --no-bytecode --output-dir dist --clear
          npx eas update --branch production --environment production \
            --input-dir dist --skip-bundler \
            --message "${{ github.event.head_commit.message || format('OTA from {0}', github.ref_name) }}"
